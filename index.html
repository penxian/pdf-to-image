<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转图片工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body>
    <div class="absolute top-4 right-4">
        <button id="theme-toggle" class="px-4 py-2 rounded-lg bg-white/20 hover:bg-white/30 text-white transition backdrop-blur-sm">
            <svg id="sun-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM3 11a1 1 0 100-2H2a1 1 0 000 2h1zm12.95-5.05a1 1 0 001.414-1.414l.707-.707a1 1 0 00-1.414-1.414l-.707.707a1 1 0 000 1.414z" clip-rule="evenodd"></path>
            </svg>
            <svg id="moon-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.002 8.002 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </div>
    <header class="pt-8">
        <h1>PDF 转图片</h1>
        <p class="subtitle">在线将 PDF 页面转换为 PNG/JPG 图片</p>
    </header>

    <div class="container">
        <section class="upload-area" id="upload-area">
            <div class="dropzone" id="dropzone">
                <div class="dropzone-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h3>拖放 PDF 文件到这里</h3>
                    <p>或者 <button type="button" class="select-file-btn">选择文件</button></p>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
            </div>
        </section>

        <section class="settings" id="settings" style="display: none;">
            <h3>转换设置</h3>
            <div class="setting-row">
                <label>
                    <span>图片质量 (DPI)</span>
                    <select id="dpi">
                        <option value="72">低 (72 DPI)</option>
                        <option value="150" selected>中 (150 DPI)</option>
                        <option value="300">高 (300 DPI)</option>
                        <option value="600">极高 (600 DPI)</option>
                    </select>
                </label>
            </div>
            <div class="setting-row">
                <label>
                    <span>输出格式</span>
                    <select id="format">
                        <option value="png" selected>PNG</option>
                        <option value="jpeg">JPEG</option>
                    </select>
                </label>
            </div>
            <div class="setting-row">
                <label>
                    <span>图片质量 (JPEG)</span>
                    <input type="range" id="quality" min="10" max="100" value="80">
                    <span id="quality-value">80%</span>
                </label>
            </div>
            <div class="convert-btn-container">
                <button id="convert-btn" class="convert-btn">开始转换</button>
            </div>
        </section>

        <section class="progress" id="progress" style="display: none;">
            <h3>转换中...</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text">准备中...</p>
        </section>

        <section class="result" id="result" style="display: none;">
            <h3>转换完成</h3>
            <div class="result-stats" id="result-stats"></div>
            <div class="image-list" id="image-list"></div>
            <div class="download-all-container">
                <button id="download-all-btn" class="download-all-btn">下载全部 (ZIP)</button>
            </div>
        </section>
    </div>

    <footer>
        <p>纯前端转换 · 文件不上传服务器 · 隐私安全 · 免费使用</p>
    </footer>

    <script src="https://cdnjs.loli.net/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.loli.net/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // 主题切换
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        
        // 检查本地存储偏好
        if (localStorage.getItem('theme') === 'dark' || 
            (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }
        
        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
